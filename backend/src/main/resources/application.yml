server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: capics-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/capics}
    username: ${DB_USERNAME:capics_user}
    password: ${DB_PASSWORD:please_change_me}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:please-change-this-secret-at-least-32-characters}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.capics: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
