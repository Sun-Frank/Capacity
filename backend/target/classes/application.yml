server:
  port: 8080

spring:
  application:
    name: capics-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/capics
    username: postgres
    password: 123456Lbt
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: capics-secret-key-for-jwt-token-generation-must-be-at-least-256-bits
  expiration: 86400000

logging:
  level:
    com.capics: DEBUG
    org.springframework.security: DEBUG
